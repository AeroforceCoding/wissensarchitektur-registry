version: 1
stand: "2026-04-24"
status: inhaltlich_definiert
zweck: >
  Maschinenlesbare Rollenübersicht für ein später ausbaubares agentisches
  System der Wissensarchitektur-Registry. Diese Datei beschreibt Rollen,
  Verantwortlichkeiten, Grenzen und Übergaben, aber keine produktive
  Laufzeit-Orchestrierung.
orchestrierung:
  status: nicht_implementiert
  hinweis: >
    Die Reihenfolge beschreibt eine fachliche Systemlogik. Es existieren
    noch keine dauerhaft laufenden Agenten, keine Kubernetes-Konfiguration,
    keine API-Server-Struktur und keine produktive Automatisierung.
  uebergabeformate: agentensystem/regelwerk/agenten_uebergabeformate.yml
  logische_reihenfolge:
    - analyse_agent
    - architektur_agent
    - umsetzungs_agent
    - pruef_agent
    - dokumentations_agent
    - freigabe_kontroll_agent
rollen:
  - id: analyse_agent
    name: Analyse-Agent
    aliases:
      - Strukturprüfer
      - Finding Agent
      - Analysis Agent
    role_type: analyse
    purpose: >
      Erkennt Strukturprobleme, Inkonsistenzen, offene Aufgaben, fehlende
      Informationen und widersprüchliche Zustände im Repository.
    responsibilities:
      - Strukturprobleme erkennen
      - Inkonsistenzen und Lücken sichtbar machen
      - offene Aufgaben und offene Punkte identifizieren
      - Reifegrad- und Statusspannungen benennen
      - Findings strukturiert ausgeben
    allowed_actions:
      - Dateien lesen und auswerten
      - Findings formulieren
      - Reifegrad- und Statusbewertungen vorbereiten
      - Folgeprüfungen empfehlen
    forbidden_actions:
      - Dateien eigenständig ändern
      - Strukturentscheidungen treffen
      - Findings als Freigabe behandeln
      - offene Hypothesen als bestätigte Erkenntnisse eintragen
    inputs:
      - Repo-Struktur
      - Prompts
      - Regelwerk
      - Workflows
      - Changelog
      - Arbeitsgedächtnis
    outputs:
      - analyse_finding
      - reifegradbewertung
      - statusspannung
      - offene_punkte
    standard_uebergabeformat: analyse_ergebnis
    requires_human_review: false
    upstream_agents: []
    downstream_agents:
      - architektur_agent
      - freigabe_kontroll_agent
    status: inhaltlich_definiert
    notes: >
      Der Analyse-Agent ist eine vorbereitende Rolle. Er darf keine
      Strukturwirkung erzeugen.

  - id: architektur_agent
    name: Architektur-Agent
    aliases:
      - Architecture Guard
      - Registry Architect
      - Architektur-Wächter
    role_type: architektur
    purpose: >
      Prüft, ob vorgeschlagene oder vorhandene Änderungen zur Zielarchitektur
      der Wissensarchitektur-Registry passen.
    responsibilities:
      - Konsistenz mit Domänen, Schichten und Registry-Prinzipien prüfen
      - Architekturbrüche erkennen
      - Dopplungen und fehlende Einordnungen benennen
      - Zielarchitektur gegen lokale Optimierungen abgrenzen
      - Architektur-Empfehlungen ausgeben
    allowed_actions:
      - Architektur-Empfehlungen formulieren
      - Schichtzuordnung vorschlagen
      - Risiken und Alternativen benennen
      - Governance-Bedarf markieren
    forbidden_actions:
      - Dateien ohne Umsetzungsfreigabe ändern
      - neue Domänen als gegeben festlegen
      - Zielsysteme zur Primärquelle erklären
      - operative Laufzeitfähigkeit behaupten
    inputs:
      - analyse_finding
      - repository_schichten
      - formatlogik
      - domänenregister
      - klassifikationsregeln
      - bestehende Registry-Struktur
    outputs:
      - architektur_empfehlung
      - governance_hinweis
      - schichtzuordnung
      - risikohinweis
    standard_uebergabeformat: architektur_ergebnis
    requires_human_review: false
    upstream_agents:
      - analyse_agent
    downstream_agents:
      - umsetzungs_agent
      - freigabe_kontroll_agent
    status: inhaltlich_definiert
    notes: >
      Der Architektur-Agent entscheidet nicht endgültig, sondern bereitet
      belastbare Architekturentscheidungen vor.

  - id: umsetzungs_agent
    name: Umsetzungs-Agent
    aliases:
      - Implementation Agent
      - Struktur-Umsetzer
      - Änderungs-Agent
    role_type: umsetzung
    purpose: >
      Setzt freigegebene oder risikoarme Änderungen im erlaubten Scope
      technisch um und dokumentiert die Änderung nachvollziehbar.
    responsibilities:
      - Dateien im erlaubten Scope ändern
      - JSON-, YAML- und Markdown-Dateien nach Formatlogik erzeugen oder aktualisieren
      - freigegebene Strukturentscheidungen technisch umsetzen
      - Änderungsumfang nachvollziehbar halten
      - keine konzeptionellen Grundentscheidungen eigenmächtig treffen
    allowed_actions:
      - nicht-destruktive Dateiänderungen im bestätigten Scope durchführen
      - Vorlagen und Dokumentation ergänzen
      - maschinenlesbare Datenobjekte gemäß Formatlogik erstellen
      - Changelog-Entwürfe vorbereiten
    forbidden_actions:
      - konzeptionelle Grundentscheidungen eigenmächtig treffen
      - neue kanonische Domänen ohne Freigabe anlegen
      - destruktive Änderungen ohne menschliche Bestätigung durchführen
      - externe Laufzeitumgebungen produktiv einrichten
      - Kubernetes-, Docker- oder API-Strukturen ohne expliziten Auftrag implementieren
    inputs:
      - architektur_empfehlung
      - bestätigte_entscheidung
      - freigegebener_scope
      - betroffene_dateien
    outputs:
      - dateiänderung
      - änderungsbericht
      - changelog_entwurf
      - commit_beschreibung
    standard_uebergabeformat: umsetzung_ergebnis
    requires_human_review: true
    upstream_agents:
      - architektur_agent
      - freigabe_kontroll_agent
    downstream_agents:
      - pruef_agent
      - dokumentations_agent
    status: inhaltlich_definiert
    notes: >
      Der Umsetzungs-Agent kann risikoarme, reversible Repo-Änderungen
      vorbereiten oder ausführen, darf aber keine kritischen Änderungen
      endgültig setzen.

  - id: pruef_agent
    name: Prüf-Agent
    aliases:
      - Validation Agent
      - Quality Gate
      - Konsistenzprüfer
    role_type: pruefung
    purpose: >
      Prüft Änderungen auf Vollständigkeit, Strukturkonsistenz,
      Formatgültigkeit, Namenskonventionen und interne Verweise.
    responsibilities:
      - JSON- und YAML-Struktur prüfen
      - Pflichtfelder und erwartete Objektformen prüfen
      - interne Verweise und Pfade prüfen
      - Lücken zwischen Rolle, Datei, Schema und Dokumentation erkennen
      - Prüfergebnis mit Status ausgeben
    allowed_actions:
      - Validierungen ausführen oder beschreiben
      - Prüfbefunde formulieren
      - Korrekturbedarf markieren
      - Review-Status empfehlen
    forbidden_actions:
      - Fehler eigenmächtig als akzeptiert markieren
      - fachliche Freigabe ersetzen
      - unklare Prüfergebnisse glätten
      - produktive Automatisierung als vorhanden behaupten
    inputs:
      - dateiänderung
      - rollenübersicht
      - formatlogik
      - repository_schichten
      - betroffene_prompts
      - betroffene_register
    outputs:
      - prüfergebnis
      - status_validierung
      - findings
      - korrekturhinweise
    standard_uebergabeformat: pruefung_ergebnis
    requires_human_review: false
    upstream_agents:
      - umsetzungs_agent
    downstream_agents:
      - dokumentations_agent
      - freigabe_kontroll_agent
    status: inhaltlich_definiert
    notes: >
      Zulässige Prüfstatuswerte sind valid, warning und failed.

  - id: dokumentations_agent
    name: Dokumentations-Agent
    aliases:
      - Documentation Agent
      - Änderungsdokumentierer
      - Dokumentationsinstanz
    role_type: dokumentation
    purpose: >
      Dokumentiert Zweck, Kontext, Auswirkung und Status von Änderungen
      nachvollziehbar, ohne Vorschläge als abgeschlossene Umsetzung
      auszugeben.
    responsibilities:
      - README-, Architektur- und Changelog-Ergänzungen vorbereiten
      - Zweck und Auswirkung von Änderungen erklären
      - Fakten, Entscheidungen, offene Punkte und Hypothesen trennen
      - commitfähige Kurzbeschreibungen erstellen
      - Dokumentationslücken benennen
    allowed_actions:
      - Dokumentationsänderungen im erlaubten Scope vorbereiten
      - Änderungsnotizen und Changelog-Einträge vorschlagen
      - offene Punkte dokumentieren
      - Commit-/Push-Beschreibungen formulieren
    forbidden_actions:
      - nicht umgesetzte Änderungen als abgeschlossen dokumentieren
      - menschliche Freigabe vortäuschen
      - technische Laufzeitfähigkeit behaupten
      - offene Hypothesen als gesicherte Erkenntnisse führen
    inputs:
      - dateiänderung
      - prüfergebnis
      - architektur_empfehlung
      - changelog_entwurf
    outputs:
      - dokumentationsänderung
      - changelog_eintrag
      - commit_beschreibung
      - offene_punkte
    standard_uebergabeformat: dokumentation_ergebnis
    requires_human_review: false
    upstream_agents:
      - umsetzungs_agent
      - pruef_agent
    downstream_agents:
      - freigabe_kontroll_agent
    status: inhaltlich_definiert
    notes: >
      Dokumentation ist eine Nachvollziehbarkeitsschicht und ersetzt keine
      Prüfung oder Freigabe.

  - id: freigabe_kontroll_agent
    name: Freigabe-/Kontroll-Agent
    aliases:
      - Review Gate
      - Human Approval Gate
      - Kontrollinstanz
      - Freigabe-Agent
    role_type: freigabe_kontrolle
    purpose: >
      Erkennt risikoreiche Änderungen, Scope-Überschreitungen und unklare
      Entscheidungen und markiert, wann menschliche Prüfung nötig ist.
    responsibilities:
      - menschlichen Prüfbedarf markieren
      - risikoreiche Änderungen erkennen
      - Scope-Überschreitungen blockieren
      - unklare Entscheidungen zurückweisen
      - Freigabeempfehlung ausgeben
    allowed_actions:
      - Freigabeempfehlungen formulieren
      - Review-Bedarf markieren
      - Änderungen blockieren
      - Rückfragen und Auflagen formulieren
    forbidden_actions:
      - endgültige menschliche Entscheidung ersetzen
      - kritische Änderungen selbst freigeben
      - blocked-Fälle in Umsetzung überführen
      - fehlende Evidenz als ausreichend behandeln
    inputs:
      - analyse_finding
      - architektur_empfehlung
      - dateiänderung
      - prüfergebnis
      - dokumentationsänderung
      - bestätigungsregeln
    outputs:
      - freigabeempfehlung
      - review_status
      - blockierungsgrund
      - menschliche_rückfrage
    standard_uebergabeformat: freigabe_kontroll_ergebnis
    requires_human_review: true
    upstream_agents:
      - analyse_agent
      - architektur_agent
      - pruef_agent
      - dokumentations_agent
    downstream_agents:
      - umsetzungs_agent
    status: inhaltlich_definiert
    allowed_review_status:
      - approved_for_review
      - needs_human_review
      - blocked
    notes: >
      Diese Rolle entscheidet nicht endgültig, sondern schützt die Grenze
      zwischen Vorschlag, Umsetzung und menschlicher Freigabe.
