  - schlüssel: entra_id
    titel: Entra ID
    beschreibung: Kennzeichnet Inhalte zu Identitäten, Verzeichnissen, Authentifizierung und Verzeichnisobjekten.
  - schlüssel: sharepoint
    titel: SharePoint
